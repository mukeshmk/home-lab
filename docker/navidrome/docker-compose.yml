services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    ports:
      - 4533:4533
    restart: unless-stopped
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info  
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ""
      # Add any other options here, e.g., ND_DEFAULTTHEME: "Spotify"
    volumes:
      - ${BASE_PATH}/navidrome/data:/data
      - ${MUSIC_PATH}:/music:ro
