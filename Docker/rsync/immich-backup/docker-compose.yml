services:
  immich-backup:
    image: alpine:latest
    container_name: immich-automated-backup
    environment:
      - TZ=${TZ:-Europe/Dublin}
    volumes:
      - ${BASE_PATH}/rclone:/rclone
      - ${IMMICH_PATH}:/immich:ro
      - ${RSYNC_PATH}:/rsync
    command: >
      sh -c "apk add --no-cache bash rsync rclone tzdata coreutils &&
             echo '0 2 * * 0 bash /rclone/immich/backup.sh' > /etc/crontabs/root &&
             crond -f -d 8"
    restart: unless-stopped
